<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body {
    margin: 0;
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #FFE8E8 0%, #FFF0E8 30%, #F0E8FF 60%, #E8F5EE 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;

  .loading {
    text-align: center;
    color: #C87090;
    font-size: 48px;
    animation: pulse 1.5s ease-in-out infinite;

  @keyframes pulse {

  }

<link rel="preconnect" href="https://fonts.googleapis.com">

<body>
<div class="loading">🪐</div>

<script>
  const SUPABASE_URL = 'https://buowsgggbkpsssspewtk.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_Oz8d08OndfOkZe-xIjm4_g_Gw1SEyeO';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  sb.auth.getSession().then(({ data: { session } }) => {
    if (!session) {
      window.location.href = 'login.html';
    } else {
      // User is logged in — load the personal app
      const userName = session.user.user_metadata?.full_name || session.user.email.split('@')[0];
      loadApp(userName, session.user.email);
    }
  });

  function loadApp(name, email) {

        style="width:100%;height:100vh;border:none;display:block"

      ></iframe>
    `;
  }
</script>
